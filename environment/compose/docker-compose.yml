services:

  mongodbsrv:
    image:
      mongodb/mongodb-community-server:latest
    container_name: mongodbsrv
    ports:
      - "127.0.0.1:27017:27017"


  db_transfer_pg:
    image: postgres:latest
    container_name: db_transfer_pg
    restart: "no"
    environment:
      POSTGRES_PASSWORD: "pwd"
      POSTGRES_USER: "myuser"
      POSTGRES_DB: "transfer_db"
    ports:
      - "127.0.0.1:5432:5432"
    mem_limit: "1000m"
    command: docker-entrypoint.sh postgres

  transfer_one:
    image:
      transfer_c1
    depends_on:
      - mongodbsrv
      - db_transfer_pg
    container_name: transfer_one
    ports:
      - "127.0.0.1:8082:8082"
      - "35005:5005"
    hostname: transfer-one-host
    restart: "no"
    environment:
      - spring.activemq.broker-url=tcp://active-host:61616

#  transfer_two:
#      image:
#        transfer_c1
#      depends_on:
#        - mongodbsrv
#      container_name: transfer_two
#      ports:
#        - 127.0.0.1:8083:8082
#        - 35006:5005
#      restart: "no"
#      environment:
#        - spring.activemq.broker-url=tcp://active-host:61616


  active_mq:
    image:
      apache/activemq:latest
    container_name: active-mq
    expose:
      - "61616"
    ports:
      - "61616:61616"   # JMS
      - "8161:8161"
    links:
      - transfer_one
#      - transfer_two
    restart: "no"
    hostname: active-host




